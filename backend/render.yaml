services:
  - type: web
    name: orienta-mais-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: orienta-mais-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://orienta-mais-frontend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: orienta-mais-db
    plan: free